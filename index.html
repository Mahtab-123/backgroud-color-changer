<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BackGround Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: black; color: white;">
    <div id="parent">
        <button id="red" style = "background-color: red; ">Red</button>
        <button id="blue" style = "background-color: blue; ">Blue</button>
        <button id="violet" style = "background-color: violet; ">Violet</button>
        <button id="grey" style = "background-color: grey; ">Grey</button>
        <button id="papayawhip" style = "background-color: papayawhip; ">Papayawhip</button>
        <button id="purple" style = "background-color: purple; ">Purple</button>
    </div>

    <script src="./script.js"></script>
</body>
</html>
